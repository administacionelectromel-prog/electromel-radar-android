# ELECTROMEL RADAR — Compila la APK en cada push a main.
#
# CÓMO BAJAR LA APK DESDE EL CELULAR:
#   Opción A (más fácil): pestaña "Releases" del repo → electromel-radar.apk
#   Opción B: pestaña "Actions" → última ejecución → Artifacts
#
# No necesitás Android Studio ni PC: pusheás, esperás ~5 min, bajás.

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # necesario para publicar el Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk electromel-radar.apk

      - name: Subir como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: electromel-radar-apk
          path: electromel-radar.apk

      - name: Publicar en Releases (tag "latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ELECTROMEL RADAR — última APK"
          body: "APK compilada automáticamente del último push. Descargala e instalala directo en el celular."
          files: electromel-radar.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
